<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MOI Ledger</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            background: #f9f9f9;
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            border-left: 4px solid #4CAF50;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .error {
            border-left-color: #f44336;
            background: #ffebee;
        }
        .success {
            border-left-color: #4CAF50;
            background: #e8f5e9;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        label {
            font-weight: bold;
            color: #555;
            font-size: 14px;
            display: block;
            margin-top: 15px;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 13px;
            line-height: 1.6;
            border-left: 4px solid #2196F3;
        }
        .warning {
            background: #fff3e0;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 13px;
            border-left: 4px solid #ff9800;
        }
        .step {
            background: #f5f5f5;
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Reset Password</h1>
        <p class="subtitle">MOI Ledger - Emergency Password Reset</p>
        
        <div class="warning">
            <strong>⚠️ Use this ONLY if:</strong>
            <ul style="margin: 10px 0; padding-left: 20px;">
                <li>You can't login with your current password</li>
                <li>You want to set a new password</li>
            </ul>
        </div>

        <label>Your Email Address</label>
        <input type="email" id="email" placeholder="palanikumar0508@gmail.com" value="palanikumar0508@gmail.com">
        
        <label>New Password (min 8 characters)</label>
        <input type="password" id="newPassword" placeholder="Enter new password" value="">
        
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter new password" value="">
        
        <button onclick="resetPassword()" id="resetBtn">Reset Password</button>
        
        <div id="result" class="result"></div>

        <div class="info">
            <strong>📝 After Reset:</strong>
            <div class="step">1. Wait for success message</div>
            <div class="step">2. Go to login page</div>
            <div class="step">3. Use your email and NEW password</div>
            <div class="step">4. Should work! ✅</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://moi-ledger.onrender.com/api';

        function showResult(message, isError = false) {
            const element = document.getElementById('result');
            element.className = 'result show ' + (isError ? 'error' : 'success');
            element.textContent = message;
        }

        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            // Validation
            if (!email) {
                showResult('❌ Please enter your email address', true);
                return;
            }

            if (!newPassword) {
                showResult('❌ Please enter a new password', true);
                return;
            }

            if (newPassword.length < 8) {
                showResult('❌ Password must be at least 8 characters', true);
                return;
            }

            if (newPassword !== confirmPassword) {
                showResult('❌ Passwords do not match', true);
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const response = await fetch(`${API_URL}/debug/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showResult(
                        '✅ PASSWORD RESET SUCCESSFUL!\n\n' +
                        'Email: ' + data.email + '\n' +
                        'User ID: ' + data.userId + '\n\n' +
                        '👉 Now go to login page and use your NEW password!',
                        false
                    );
                } else {
                    showResult(
                        '❌ RESET FAILED\n\n' +
                        'Error: ' + (data.message || 'Unknown error') + '\n\n' +
                        (data.searchedEmail ? 'Searched for: ' + data.searchedEmail : ''),
                        true
                    );
                }
            } catch (error) {
                showResult(
                    '❌ CONNECTION ERROR\n\n' +
                    'Error: ' + error.message + '\n\n' +
                    'Make sure backend is deployed and running.',
                    true
                );
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                resetPassword();
            }
        });
    </script>
</body>
</html>
